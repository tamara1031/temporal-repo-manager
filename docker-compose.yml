# Local dev stack: Temporal dev server + agent worker.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f worker
#
# Trigger a workflow once both are up:
#   docker compose exec temporal temporal workflow start \
#       --task-queue repo-steward \
#       --workflow-id smoke-$(date +%s) \
#       --type periodicRefactorWorkflow \
#       --input '{"repoFullName":"<owner>/<repo>","baseBranch":"main"}'

services:
  temporal:
    image: temporalio/temporal:latest
    container_name: agent-temporal
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --log-level
      - warn
    ports:
      - "7233:7233"   # frontend gRPC
      - "8233:8233"   # web UI
    healthcheck:
      test: ["CMD", "temporal", "operator", "namespace", "list", "--address", "127.0.0.1:7233"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  # codex app-server sidecar.  Shares the workspaces volume with the worker.
  # Auth is mounted here (not in the worker) because only the sidecar invokes
  # the codex CLI.  The worker reaches this container at ws://codex-app-server:8765
  # (set via CODEX_APP_SERVER_URL).
  codex-app-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: temporal-repo-steward:dev
    container_name: agent-codex-app-server
    command: ["codex", "app-server", "--listen", "ws://0.0.0.0:8765"]
    environment:
      HOME: /home/agent
    volumes:
      - ${HOME}/.codex/auth.json:/home/agent/.codex/auth.json:ro
      - workspaces:/workspaces
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8765/readyz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: temporal-repo-steward:dev
    container_name: agent-worker
    depends_on:
      temporal:
        condition: service_healthy
      codex-app-server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: repo-steward
      TEMPORAL_TLS: "false"
      HOME: /home/agent
      # Route all codex calls to the app-server sidecar.
      CODEX_APP_SERVER_URL: ws://codex-app-server:8765
    volumes:
      # workdir 用の永続ボリューム（コンテナ再起動でも消えない）
      - workspaces:/workspaces
    restart: unless-stopped

volumes:
  workspaces:
