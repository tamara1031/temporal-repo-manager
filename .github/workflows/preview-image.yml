name: Preview image

# Worker Docker image lifecycle:
#   - PR: build only (Dockerfile sanity). No GHCR login, no push.
#   - main CI green (workflow_run) / manual dispatch: build + push to GHCR
#     as `:preview` (moving) and `:sha-<short>` (immutable per-commit).
on:
  pull_request:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel old PR builds when a new commit lands on the same PR. For main /
# manual runs we serialize (no cancel) so we never abandon a half-pushed image.
concurrency:
  group: preview-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ github.event_name == 'pull_request' && 'build (PR sanity)' || 'build & push :preview' }}
    # workflow_run also fires on red CI; only publish when it succeeded.
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Only need write on push-bound runs, but GitHub merges permissions
      # by job, not by step. The login step is gated separately.
      packages: write
    steps:
      - name: Resolve checkout ref
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.sha }}

      - name: Compute image tags
        id: img
        run: |
          name="ghcr.io/${GITHUB_REPOSITORY,,}"
          short="${{ steps.refs.outputs.sha }}"
          short="${short:0:7}"
          {
            echo "name=$name"
            echo "tags=$name:preview,$name:sha-$short"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build${{ github.event_name != 'pull_request' && ' & push' || '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.img.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
