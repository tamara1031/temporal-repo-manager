name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel any in-flight run for the same ref when a new push lands —
# saves CI minutes on rapid iteration (e.g. agent self-heal cycles).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build / lint / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Lint (src)
        run: npm run lint

      - name: Lint (tests)
        run: npm run lint.tests

      - name: Test
        run: npm test
        env:
          # Vitest has a 60s timeout configured in vitest.config.ts;
          # CI runners can be slower than local — bump the inner Temporal
          # test-server boot allowance.
          CI: 'true'

  image:
    name: docker image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # PR では push せず build のみ。main への push 時のみ GHCR に push。
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.img.outputs.name }}:preview
          cache-from: type=gha
          cache-to: type=gha,mode=max
